<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fansly Rank Overlay</title>
    <link rel="stylesheet" href="/overlay.css" />
  </head>
  <body>
    <main class="overlay" id="overlayRoot">
      <section class="rank-card" id="rankCard">
        <div class="logo-rain" aria-hidden="true">
          <span style="--x: 4%; --size: 28px; --delay: -2s; --duration: 16s; --drift: 34px; --spin: 28deg"></span>
          <span style="--x: 13%; --size: 18px; --delay: -9s; --duration: 20s; --drift: -22px; --spin: -20deg"></span>
          <span style="--x: 22%; --size: 34px; --delay: -5s; --duration: 18s; --drift: 18px; --spin: 36deg"></span>
          <span style="--x: 31%; --size: 22px; --delay: -13s; --duration: 23s; --drift: -36px; --spin: -34deg"></span>
          <span style="--x: 40%; --size: 30px; --delay: -7s; --duration: 17s; --drift: 28px; --spin: 24deg"></span>
          <span style="--x: 49%; --size: 20px; --delay: -15s; --duration: 22s; --drift: -18px; --spin: -18deg"></span>
          <span style="--x: 58%; --size: 36px; --delay: -4s; --duration: 19s; --drift: 24px; --spin: 42deg"></span>
          <span style="--x: 67%; --size: 24px; --delay: -11s; --duration: 21s; --drift: -30px; --spin: -26deg"></span>
          <span style="--x: 76%; --size: 32px; --delay: -1s; --duration: 18s; --drift: 20px; --spin: 30deg"></span>
          <span style="--x: 85%; --size: 19px; --delay: -12s; --duration: 24s; --drift: -24px; --spin: -24deg"></span>
          <span style="--x: 93%; --size: 29px; --delay: -6s; --duration: 20s; --drift: 26px; --spin: 32deg"></span>
        </div>
        <div class="shine"></div>
        <div class="rank-copy">
          <p class="kicker" id="overlayTitle">Fansly Leaderboard Rank</p>
          <div class="rank-line">
            <span class="hash">#</span>
            <span class="rank" id="rankValue">--</span>
          </div>
          <div class="arrow-field" id="arrowField" aria-hidden="true"></div>
          <div class="confetti-field" id="confettiField" aria-hidden="true"></div>
        </div>
        <div class="side-stack">
          <div class="movement-pill" id="movementPill">Waiting</div>
          <div class="countdown-pill" id="countdownPill">
            <span>Ends in</span>
            <strong id="overlayCountdown">--</strong>
          </div>
        </div>
      </section>
      <section class="history-strip" id="historyStrip"></section>
    </main>
    <script src="/overlay.js" type="module"></script>
  </body>
</html>
